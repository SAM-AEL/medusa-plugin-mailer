<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Subject }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f6f6f6;
            color: #333333;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            background-color: #f6f6f6;
            padding: 40px 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }
        .header {
            background-color: #ffffff;
            padding: 40px 40px 30px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .header h1 {
            color: #111827;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .body {
            padding: 40px;
        }
        .greeting {
            font-size: 18px;
            font-weight: 400;
            color: #111827;
            margin-bottom: 20px;
        }
        .message {
            font-size: 15px;
            line-height: 1.8;
            color: #4b5563;
            margin-bottom: 30px;
        }
        .cta-container {
            text-align: center;
            margin: 35px 0 10px;
        }
        .cta-button {
            display: inline-block;
            background-color: #111827;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }
        .footer {
            background-color: #f9fafb;
            border-top: 1px solid #f3f4f6;
            padding: 30px 40px;
            text-align: center;
        }
        .footer p {
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>{{ .StoreName }}</h1>
            </div>
            <div class="body">
                <p class="greeting">Confirm Your Account</p>
                <p class="message">
                    Hi {{ .first_name }},
                    <br><br>
                    Please confirm your email address by clicking the button below. This helps us secure your account.
                </p>
                <!-- Optional CTA -->
                <!-- <div class="cta-container"> -->
                <!--     <a href="{{ .confirmation_link }}" class="cta-button">Confirm Account</a> -->
                <!-- </div> -->
            </div>
            <div class="footer">
                <p>
                    Sent to {{ .RecipientEmail }}.<br>
                    Questions? Just reply to this email.
                </p>
                <p style="margin-top: 12px;">© {{ .StoreName }}.</p>
            </div>
        </div>
    </div>
</body>
</html>
